meta:
  version: "2.4.0"

llm:
  default_modes:
    action_decision: "normal"
    long_term_objective: "normal"
    nickname: "normal"
    single_choice: "normal"
    relation_resolver: "fast"
    relation_delta: "fast"
    story_teller: "fast"
    interaction_feedback: "fast"
    history_influence: "normal"
    backstory: "fast"
    custom_content_generation: "normal"
    random_minor_event: "fast"
    sect_random_event: "fast"
    sect_random_event_reason: "fast"
    sect_decider: "normal"
    sect_thinker: "fast"

paths:
  locales: static/locales/
  shared_game_configs: static/game_configs/
  # templates: static/templates/  <-- Managed by code now
  # game_configs: static/game_configs/ <-- Managed by code now
  saves: assets/saves/

ai:
  max_concurrent_requests: 10
  max_parse_retries: 3

game:
  init_npc_num: 9
  sect_num: 3 # init_npc_num 大于 sect_num 时，会随机选择 sect_num 个宗门
  start_year: 100 # 世界开始年份
  npc_awakening_rate_per_month: 0.01
  story:
    enabled: true
    probabilities:
      combat: 0.4 # 战斗、暗杀、切磋
      relationship_major: 0.6 # 表白、双修、结拜
      cultivation_major: 0.40 # 突破、闭关
      crafting: 0.10 # 炼丹、铸造、御兽
      daily_social: 0.08 # 交谈、送礼、传道、茶会、下棋
      sect_mission: 0.4 # 宗门任务
      world_fortune: 0.50 # 奇遇
      world_misfortune: 0.35 # 霉运
      gathering: 1.0 # 拍卖会、秘境探索、天下武道会、宗门传道大会
  autonomous_creation_probability: 0.001
  autonomous_creation_story_probability: 0.5
  fortune_probability: 0.005
  misfortune_probability: 0.005
  random_minor_event_prob: 0.05 # 随机小事每月触发概率 (5%)
  birth_rate_per_month: 0.005 # 每月生育概率 (0.5%)
  max_children_per_couple: 2 # 每对道侣最大子女数量
  max_action_rounds_per_turn: 3 # 每回合动作最大轮数（处理抢占/连招）
  long_dead_cleanup_years: 20 # 多少年后清理已经完全没有影响力的死者
  gathering:
    auction_trigger_count: 5
    sect_teaching_prob: 0.05
    base_epiphany_prob: 0.02

sect:
  income_per_tile: 7  # 势力范围内每地块每年基础灵石产出（配合更大势力范围做平衡）
  influence_radius_divisor: 8  # 宗门战力换算势力半径时的除数，越小半径越大
  influence_radius_bias: 1  # 宗门势力半径基础偏移
  territory_distance_weight: 100  # 格子归属时，距离总部的主导权重
  territory_strength_weight: 12  # 格子归属时，宗门战力对边界竞争的权重
  territory_noise_weight: 6  # 格子归属时的稳定锯齿扰动强度
  territory_dense_border_threshold: 8  # 接壤边达到该阈值后，关系额外恶化
  random_event_prob_per_month: 0.03 # 宗门随机事件每月触发概率（全局单次抽签）
  decision_interval_years: 1
  thinking_interval_years: 5
  recruit_cost: 500
  support_amount: 300
  member_upkeep_by_realm:
    QI_REFINEMENT: 15
    FOUNDATION_ESTABLISHMENT: 30
    CORE_FORMATION: 60
    NASCENT_SOUL: 120
df:
  ids_separator: ";"

avatar:
  persona_num: 3

social:
  major_event_context_num: 10  # 大事（长期记忆）展示数量
  minor_event_context_num: 10  # 小事（短期记忆）展示数量
  relation:
    min_friendliness: -100
    max_friendliness: 100
    yearly_regression: 2
    yearly_regression_with_identity: 1
    transition_hysteresis: 10
    transition_cooldown_months: 12
    thresholds:
      archenemy: -60
      disliked: -25
      friend: 25
      best_friend: 60
    llm_delta:
      min: -6
      max: 6
    identity_friendliness_floor:
      lovers: 20
      sworn_sibling: 20
      master_apprentice: 10
    action_modes:
      conversation: llm
      talk: llm
      gift: llm
      spar: llm
      gathering: llm
      random_minor_event: llm
    fixed_deltas:
      confess:
        accepted:
          a_to_b: 35
          b_to_a: 25
        rejected:
          a_to_b: -20
          b_to_a: -8
      dual_cultivation:
        accepted:
          a_to_b: 12
          b_to_a: 12
        rejected:
          a_to_b: -6
          b_to_a: -2
      swear_brotherhood:
        accepted:
          a_to_b: 22
          b_to_a: 22
        rejected:
          a_to_b: -10
          b_to_a: -4
      attack:
        started:
          a_to_b: -25
          b_to_a: -35
      impart:
        accepted:
          a_to_b: 8
          b_to_a: 12
        rejected:
          a_to_b: -4
          b_to_a: -2
      gathering:
        friendly:
          a_to_b: 4
          b_to_a: 4
        competitive:
          a_to_b: -6
          b_to_a: -8

nickname:
  major_event_threshold: 3  # 获得绰号所需的长期事件数量
  minor_event_threshold: 25  # 获得绰号所需的短期事件数量

save:
  max_events_to_save: 1000

frontend:
  water_speed: low
  cloud_freq: low
system:
  language: zh-CN
  host: "127.0.0.1"  # 服务器绑定地址，设为 "0.0.0.0" 可允许局域网访问
  port: 8002         # 服务器端口

play:
  base_benefit_probability: 0.05

